<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 300px; height: 600px;
    background: var(--figma-color-bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    font-size: 12px;
    color: var(--figma-color-text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  body { overflow: hidden; }

  body { display: flex; flex-direction: column; }
  .app { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }

  /* Search */
  .top { padding: 16px 16px 0; flex-shrink: 0; }
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-ico { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--figma-color-text-tertiary); pointer-events: none; display: flex; }
  .search-input {
    width: 100%; height: 30px; padding: 0 28px;
    background: var(--figma-color-bg-secondary);
    border: none;
    border-radius: 5px;
    font-size: 12px;
    color: var(--figma-color-text);
    outline: none;
    transition: border-color .1s;
  }
  .search-input::placeholder { color: var(--figma-color-text-secondary); }
  .search-input:focus { box-shadow: 0 0 0 1.5px var(--figma-color-bg-brand); }
  .search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--figma-color-text-tertiary); display: none; align-items: center; padding: 0; }
  .search-clear.visible { display: flex; }
  .search-clear:hover { color: var(--figma-color-text-secondary); }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; width: 100%; }
  .seg { display: flex; flex: 1.65; background: var(--figma-color-bg-tertiary); border-radius: 6px; padding: 2px; gap: 2px; }
  .seg-btn { height: 24px; flex: 1; padding: 0; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--figma-color-text-secondary); background: transparent; transition: all .1s; }
  .seg-btn:hover { color: var(--figma-color-text); }
  .seg-btn.on { background: var(--figma-color-bg); color: var(--figma-color-text); font-weight: 500; box-shadow: 0 0 0 1px var(--figma-color-border), 0 1px 3px rgba(0,0,0,0.15); }

  /* Weight dropdown */
  .wgt-wrap { position: relative; display: flex; align-items: center; flex: 1; }
  #wgt-select-wrap { flex: 1.43; }
  #size-select-wrap { flex: 0.93; min-width: 62px; }
  .wgt-select { height: 28px; width: 100%; padding: 0 22px 0 10px; background: var(--figma-color-bg-tertiary); border: none; border-radius: 6px; font-size: 12px; font-weight: 400; color: var(--figma-color-text-secondary); outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; transition: all .1s; }
  .wgt-select:hover { color: var(--figma-color-text); }
  .wgt-select:focus { box-shadow: 0 0 0 1.5px var(--figma-color-bg-brand); }
  .wgt-arrow { position: absolute; right: 7px; pointer-events: none; color: var(--figma-color-text-secondary); display: flex; }

  /* Grid */
  .grid-wrap { flex: 1; overflow-y: auto; min-height: 0; padding: 4px 8px 8px; scrollbar-width: thin; scrollbar-color: var(--figma-color-border) transparent; }
  .grid-wrap::-webkit-scrollbar { width: 3px; }
  .grid-wrap::-webkit-scrollbar-thumb { background: var(--figma-color-border); border-radius: 2px; }
  .grid { display: grid; gap: 1px; }

  .cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border-radius: 4px; cursor: grab; position: relative; background: transparent; border: none; transition: background .08s; padding: 4px; user-select: none; }
  .cell:active { cursor: grabbing; }
  .cell:hover { background: var(--figma-color-bg-hover); }
  .cell.done { background: var(--figma-color-bg-brand-tertiary); }
  .cell svg { flex-shrink: 0; color: var(--figma-color-text); max-width: 100%; max-height: 100%; }
  .cell-ring { position: absolute; inset: 0; border: 1.5px solid var(--figma-color-bg-brand); border-radius: 4px; opacity: 0; pointer-events: none; transition: opacity .08s; }
  .cell:hover .cell-ring { opacity: 1; }
  .cell.done .cell-ring { display: none; }
  /* Tooltip */
  .cell .tooltip { position: absolute; top: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: #1e1e1e; color: #ffffff; font-size: 10px; white-space: nowrap; padding: 3px 7px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity .1s 0s; z-index: 100; }
  .cell:hover .tooltip { opacity: 1; transition: opacity .15s 0.5s; }
  .cell.tip-left .tooltip { left: 0; transform: none; }
  .cell.tip-right .tooltip { left: auto; right: 0; transform: none; }
  .cell:hover .tooltip { opacity: 1; }
  .state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--figma-color-text-tertiary); font-size: 11px; text-align: center; padding: 24px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--figma-color-border); border-top-color: var(--figma-color-bg-brand); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .retry-btn { margin-top: 4px; height: 26px; padding: 0 12px; background: var(--figma-color-bg-brand); color: var(--figma-color-text-onbrand); border: none; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .empty { padding: 32px 8px; text-align: center; color: var(--figma-color-text-tertiary); }
  .empty-link { display: inline-block; margin-top: 8px; color: var(--figma-color-text-brand); font-size: 11px; text-decoration: none; }
  .empty-link:hover { text-decoration: underline; }
  .cat-header { font-size: 12px; font-weight: 400; color: var(--figma-color-text-tertiary); opacity: 0.7; text-transform: none; letter-spacing: 0; padding: 4px 0 4px 8px; }
  .footer { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 32px; min-height: 32px; max-height: 32px; flex-shrink: 0; flex-grow: 0; overflow: hidden; margin-top: -1px; }
  .footer-links { display: flex; gap: 14px; align-items: center; }
  .footer-link { font-size: 11px; color: var(--figma-color-text-secondary); text-decoration: none; background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; line-height: 1; height: auto; position: relative; top: -1px; }
  .footer-link:hover { color: var(--figma-color-text); }
  .footer-version { font-size: 11px; font-weight: 400; color: var(--figma-color-text-tertiary); opacity: 0.7; position: relative; top: -1px; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 0; flex-shrink: 0; }
  .header-title { font-size: 13px; font-weight: 600; color: var(--figma-color-text); letter-spacing: -0.1px; }
  .header-version { font-size: 10px; font-weight: 500; color: var(--figma-color-text-secondary); background: var(--figma-color-bg-tertiary); border-radius: 4px; padding: 2px 6px; letter-spacing: 0.2px; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="state"><div class="spinner"></div><span>Loading icons…</span></div>
</div>
<div class="footer">
  <div class="footer-links">
    <a class="footer-link" href="https://about.iconoteka.com/" target="_blank">About</a>
    <a class="footer-link" href="https://www.patreon.com/c/iconoteka" target="_blank">Support project</a>
  </div>
  <span class="footer-version">V02.00.02</span>
</div>

<script>
const CDN = "https://raw.githubusercontent.com/turbaba/Iconoteka/main/icons.json?v=" + Date.now();

const WEIGHTS = [
  { key: "thin",        label: "Thin",      stroke: 0.75 },
  { key: "ultralight",  label: "Ultralight",stroke: 1.0  },
  { key: "light",       label: "Light",     stroke: 1.25 },
  { key: "regular",     label: "Regular",   stroke: 1.5  },
  { key: "medium",      label: "Medium",    stroke: 1.75 },
  { key: "semibold",    label: "Semibold",  stroke: 2.0  },
  { key: "bold",        label: "Bold",      stroke: 2.5  },
];

let allIcons = [];
let state = { query: "", style: "stroke", weightIdx: 3, inserted: null, size: 24 };

function makeSVG(path, size, strokeWidth, fill, color) {
  const c = color || "currentColor";
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="${c}" stroke="none"><path d="${path}"/></svg>`;
}

// For canvas insertion always use black
function makeInsertSVG(path, size, strokeWidth, fill) {
  return makeSVG(path, size, strokeWidth, fill, "#000000");
}

function getPath(icon) {
  const w = WEIGHTS[state.weightIdx].key;
  const s = state.style;
  return icon.variants?.[w]?.[s]
    || (s === "fill" ? icon.variants?.["thin"]?.["fill"] : null)
    || icon.variants?.[w]?.["stroke"]
    || Object.values(Object.values(icon.variants || {})[0] || {})[0]
    || "";
}

async function loadIcons() {
  try {
    const res = await fetch(CDN);
    const data = await res.json();
    allIcons = data.icons || [];
    render();
  } catch (e) {
    document.getElementById("app").innerHTML = `
      <div class="state">
        <span>Failed to load icons</span>
        <button class="retry-btn" onclick="loadIcons()">Retry</button>
      </div>`;
  }
}

function render() {
  const scrollTop = document.querySelector(".grid-wrap")?.scrollTop || 0;
  const filtered = allIcons.filter(icon => {
    const q = state.query.toLowerCase();
    return !q || icon.name.includes(q)
      || (icon.searchTerms || []).some(t => t.includes(q))
      || icon.displayName?.toLowerCase().includes(q);
  });

  const sw = WEIGHTS[state.weightIdx];

  document.getElementById("app").innerHTML = `
    <div class="top">
      <div class="search-wrap">
        <span class="search-ico">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15" y2="15"/></svg>
        </span>
        <input class="search-input" id="search" placeholder="Search ${allIcons.filter(i => i.category !== 'Popular').length} icons" value="${state.query.replace(/"/g, '&quot;')}" spellcheck="false"/>
        <button class="search-clear ${state.query ? "visible" : ""}" id="clear-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><path d="M5.5 5.5l5 5M10.5 5.5l-5 5"/></svg>
        </button>
      </div>
      <div class="controls">
        <div class="seg">
          <button class="seg-btn ${state.style === "stroke" ? "on" : ""}" data-style="stroke">Stroke</button>
          <button class="seg-btn ${state.style === "fill"   ? "on" : ""}" data-style="fill">Fill</button>
        </div>
        <div class="wgt-wrap" id="wgt-select-wrap">
          <select class="wgt-select" id="wgt-select">
            ${WEIGHTS.map((w, i) => `<option value="${i}" ${i === state.weightIdx ? "selected" : ""}>${w.label}</option>`).join("")}
          </select>
          <span class="wgt-arrow">
            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
          </span>
        </div>
        <div class="wgt-wrap" id="size-select-wrap">
          <select class="wgt-select" id="size-select">
            ${[16,20,24,36,48].map(s => `<option value="${s}" ${s === state.size ? "selected" : ""}>${s}px</option>`).join("")}
          </select>
          <span class="wgt-arrow">
            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
          </span>
        </div>
      </div>
    </div>


    <div class="grid-wrap">
      ${filtered.length === 0
        ? `<div class="empty">
            Sorry, we don\'t have this icon yet.<br/>
            <a class="empty-link" href="https://mail.google.com/mail/u/0/?fs=1&tf=cm&source=mailto&to=hello@iconoteka.com" target="_blank">Submit a request →</a>
          </div>`
        : (() => {
            const byCategory = {};
            filtered.forEach(icon => {
              const cat = icon.category || "Other";
              if (!byCategory[cat]) byCategory[cat] = [];
              byCategory[cat].push(icon);
            });
            return Object.entries(byCategory).sort(([a], [b]) => {
              if (a === 'Popular') return -1;
              if (b === 'Popular') return 1;
              return a.localeCompare(b);
            }).map(([cat, icons]) => `
              <div class="cat-header">${cat}</div>
              <div class="grid" style="grid-template-columns: repeat(${state.size <= 24 ? 7 : state.size === 36 ? 5 : 4}, 1fr);">
                ${icons.map(icon => {
                  const path = getPath(icon);
                  const done = state.inserted === icon.name;
                  const svg  = path ? makeSVG(path, state.size, sw.stroke, state.style === "fill") : "";
                  return `
                    <div class="cell ${done ? "done" : ""}" data-icon="${icon.name}" draggable="true">
                      ${svg}
                      <span class="tooltip">${(icon.displayName || icon.name).replace(/_/g, ' ')}</span>
                      <div class="cell-ring"></div>
                    </div>`;
                }).join("")}
              </div>
            `).join("");
          })()}
    </div>
  `;

  bindEvents(filtered);
  const gw = document.querySelector(".grid-wrap");
  if (gw) gw.scrollTop = scrollTop;
}

function bindEvents(filtered) {
  document.getElementById("search")?.addEventListener("input", e => {
    state.query = e.target.value;
    const pos = e.target.selectionStart;
    render();
    const el = document.getElementById("search");
    if (el) { el.focus(); el.setSelectionRange(pos, pos); }
  });
  document.getElementById("clear-btn")?.addEventListener("click", () => {
    state.query = ""; render();
  });
  document.querySelectorAll("[data-style]").forEach(btn => {
    btn.addEventListener("click", () => { state.style = btn.dataset.style; render(); });
  });
  document.getElementById("size-select")?.addEventListener("change", e => {
    state.size = +e.target.value; render();
  });
  document.getElementById("wgt-select")?.addEventListener("change", e => {
    state.weightIdx = parseInt(e.target.value); render();
  });

  document.querySelectorAll("[data-icon]").forEach(cell => {
    const icon = filtered.find(i => i.name === cell.dataset.icon);
    if (!icon) return;

    cell.addEventListener("click", () => {
      const path = getPath(icon);
      if (!path) return;
      const svgString = makeInsertSVG(path, 24, WEIGHTS[state.weightIdx].stroke, state.style === "fill");
      parent.postMessage({ pluginMessage: { type: "insert-icon", name: icon.displayName || icon.name, svgString, size: state.size } }, "*");
      state.inserted = icon.name;
      render();
      setTimeout(() => { state.inserted = null; render(); }, 400);
    });

    cell.addEventListener("dragstart", e => {
      const path = getPath(icon);
      if (!path) return;
      const svgString = makeInsertSVG(path, 24, WEIGHTS[state.weightIdx].stroke, state.style === "fill");
      e.dataTransfer.setData("text/plain", JSON.stringify({ name: icon.displayName || icon.name, svgString }));
      e.dataTransfer.effectAllowed = "copy";
      const ghost = document.createElement("div");
      ghost.style.cssText = "position:fixed;top:-100px;left:-100px;";
      ghost.innerHTML = svgString;
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 12, 12);
      setTimeout(() => document.body.removeChild(ghost), 0);
    });
  });

  // Align tooltips based on horizontal position
  const wrap = document.querySelector(".grid-wrap");
  if (wrap) {
    const wrapRect = wrap.getBoundingClientRect();
    document.querySelectorAll(".cell").forEach(cell => {
      const rect = cell.getBoundingClientRect();
      const relLeft = rect.left - wrapRect.left;
      const relRight = wrapRect.right - rect.right;
      if (relLeft < 20) cell.classList.add("tip-left");
      else if (relRight < 20) cell.classList.add("tip-right");
    });
  }
}

loadIcons();
</script>
</body>
</html>
